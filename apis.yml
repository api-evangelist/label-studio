description: >-
  Label Studio is the most flexible open-source data labeling platform from
  HumanSignal, used to fine-tune LLMs, prepare training data, and validate AI
  models. The Label Studio REST API exposes projects, tasks, annotations,
  predictions, storage, webhooks, prompts, and review workflows.
