    description: >-
      The Label Studio REST API supports the full data labeling lifecycle: managing
      projects, tasks, annotations, annotation reviews, comments, predictions,
      ML backends, prompts, storage (S3 / Azure / GCS), webhooks, users,
      organizations, and analytics. The OpenAPI 3.1 specification is published by
      HumanSignal at https://api.labelstud.io/openapi.yaml.
