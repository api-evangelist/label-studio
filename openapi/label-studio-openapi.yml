          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: role
          in: query
          description: |
            Filter members by organization role. Accepts single role or comma-separated list of roles.

            **Format:**
            - Single role: `?role=RE`
            - Multiple roles: `?role=AN,RE` (users with ANY of these roles)

            **Role Codes:**
            - `OW` = Owner
            - `AD` = Administrator
            - `MA` = Manager
            - `RE` = Reviewer
            - `AN` = Annotator
            - `NO` = Not Activated
            - `DI` = Disabled
          required: false
          schema:
            type: string
        - name: scope
          in: query
          description: >-
            Member visibility scope. `accessible` (default) limits Managers to members in their projects/workspaces.
            `all` returns all organization members. Only affects Manager role.
