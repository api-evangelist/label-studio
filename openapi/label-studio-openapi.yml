  /api/dimensions/backfill/:
    post:
      operationId: trigger-backfill
      summary: ✨ Trigger Agreement V2 backfill
      description: >-
        <Card href="https://humansignal.com/goenterprise">
                <img style="pointer-events: none; margin-left: 0px; margin-right: 0px;" src="https://docs.humansignal.com/images/badge.svg" alt="Label Studio Enterprise badge"/>
                <p style="margin-top: 10px; font-size: 14px;">
                    This endpoint is not available in Label Studio Community Edition. [Learn more about Label Studio Enterprise](https://humansignal.com/goenterprise)
                </p>
            </Card>
        Trigger an Agreement V2 backfill for the authenticated user's active organization. Recomputes agreement score
        matrices for all tasks that are missing them. Exactly one of three body fields must be provided:


        - **project_id**: backfill a single specific project.

        - **num_projects**: batched org backfill — queue the next N not-yet-started projects (in ascending project ID
        order), leaving any currently in-flight jobs untouched. Repeat calls until `projects_remaining` in the response
        reaches 0.

        - **all_projects**: full org backfill — cancel all in-flight jobs and queue every remaining non-completed
        project at once.


        Requires administrator or owner role and the Agreement V2 feature flag.
      tags:
        - subpackage_dimensions
      parameters:
        - name: Authorization
          in: header
          description: >-
            The token (or API key) must be passed as a request header. You can find your user token on the User Account
            page in Label Studio. Example: <br><pre><code class="language-bash">curl
            https://label-studio-host/api/projects -H "Authorization: Token [your-token]"</code></pre>
          required: true
          schema:
            type: string
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementV2BackfillTriggerResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                description: Any type
        '403':
          description: ''
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: ''
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgreementV2BackfillTriggerRequestRequest'
    delete:
      operationId: cancel-backfill
      summary: ✨ Cancel Agreement V2 backfill jobs
      description: >-
        <Card href="https://humansignal.com/goenterprise">
                <img style="pointer-events: none; margin-left: 0px; margin-right: 0px;" src="https://docs.humansignal.com/images/badge.svg" alt="Label Studio Enterprise badge"/>
                <p style="margin-top: 10px; font-size: 14px;">
                    This endpoint is not available in Label Studio Community Edition. [Learn more about Label Studio Enterprise](https://humansignal.com/goenterprise)
