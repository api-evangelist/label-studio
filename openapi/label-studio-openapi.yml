    OperatorEnum:
      type: string
      enum:
        - lt
        - lte
        - gt
        - gte
        - eq
      description: |-
        * `lt` - <
        * `lte` - <=
        * `gt` - >
        * `gte` - >=
        * `eq` - =
      title: OperatorEnum
    ReviewRoutingRule:
      type: object
      properties:
        agreement_threshold:
          type:
            - string
            - 'null'
          format: decimal
          description: Agreement threshold (0..1) compared against the rule operator. Required when operator is set.
        created_at:
          type: string
          format: date-time
          description: Time this rule was created
        dimension:
          type:
            - integer
            - 'null'
          description: >-
            Dimension whose agreement is compared. Null => compare overall task agreement. Deleting the dimension
            cascades to the rule (a dimension-scoped rule has no meaning without its dimension; falling back to overall
            agreement would silently change the cohort).
        id:
          type: integer
        operator:
          oneOf:
            - $ref: '#/components/schemas/OperatorEnum'
            - type: 'null'
          description: |-
            Comparison operator applied to the agreement value. Null => catch-all rule.

            * `lt` - <
            * `lte` - <=
            * `gt` - >
            * `gte` - >=
            * `eq` - =
        order:
          type: integer
          description: Position in the rule list (rules are evaluated in ascending order)
        sample_rate:
          type: string
          format: decimal
          description: Sample rate (0..1) of matching tasks routed for review. 1 always routes, 0 never routes.
        updated_at:
          type: string
          format: date-time
          description: Last time this rule was updated
      required:
        - created_at
        - order
        - updated_at
      title: ReviewRoutingRule
    ReviewRoutingRuleRequestRequest:
      type: object
      properties:
        agreement_threshold:
          type:
            - string
            - 'null'
          format: decimal
        dimension:
          type:
            - integer
            - 'null'
        id:
          type: integer
        operator:
          oneOf:
            - $ref: '#/components/schemas/OperatorEnum'
            - type: 'null'
        sample_rate:
          type: string
          format: decimal
      required:
        - agreement_threshold
        - dimension
        - operator
        - sample_rate
      title: ReviewRoutingRuleRequestRequest
    ReviewRoutingRulesReplaceRequest:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ReviewRoutingRuleRequestRequest'
      required:
        - rules
      title: ReviewRoutingRulesReplaceRequest
