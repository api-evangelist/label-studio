          type: integer
        recordsTotal:
          type: integer
      required:
        - data
        - recordsFiltered
        - recordsTotal
      description: Serializer for ActivityLogAPI response.
      title: ActivityLogResponse
    ActionEnum:
      type: string
      enum:
        - prediction
        - propagated_annotation
        - imported
        - submitted
        - updated
        - skipped
        - accepted
        - rejected
        - fixed_and_accepted
        - deleted_review
      description: |-
        * `prediction` - Created from prediction
        * `propagated_annotation` - Created from another annotation
        * `imported` - Imported
        * `submitted` - Submitted
        * `updated` - Updated
        * `skipped` - Skipped
        * `accepted` - Accepted
        * `rejected` - Rejected
        * `fixed_and_accepted` - Fixed and accepted
        * `deleted_review` - Deleted review
      title: ActionEnum
    AnnotationHistory:
      type: object
      properties:
        action:
          oneOf:
            - $ref: '#/components/schemas/ActionEnum'
            - type: 'null'
        annotation_id:
          type:
            - integer
            - 'null'
          description: Corresponding annotation for this historical annotation
        comment:
          type:
            - string
            - 'null'
        comment_id:
          type:
            - integer
            - 'null'
          description: Comment id sent with result
        created_at:
          type: string
          format: date-time
