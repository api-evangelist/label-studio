  /api/projects/{id}/export:
    get:
      operationId: download-sync
      summary: '[Deprecated] Easy export of tasks and annotations'
      description: |2-

                This endpoint is deprecated in Enterprise. Use the async export API instead:
                POST /api/projects/{id}/exports/ (see [Create new export](/api#operation/api_projects_exports_create)).

                In Label Studio Enterprise, this endpoint will always return a 404 Not Found response with instructions to use the async export API.

                <i>Note: if you have a large project it's recommended to use
                export snapshots, this easy export endpoint might have timeouts.</i><br/><br>
                Export annotated tasks as a file in a specific format.
                For example, to export JSON annotations for a project to a file called `annotations.json`,
                run the following from the command line:
                ```bash
                curl -X GET http://localhost:8000/api/projects/{id}/export?exportType=JSON -H 'Authorization: Token abc123' --output 'annotations.json'
                ```
                To export all tasks, including skipped tasks and others without annotations, run the following from the command line:
                ```bash
                curl -X GET http://localhost:8000/api/projects/{id}/export?exportType=JSON&download_all_tasks=true -H 'Authorization: Token abc123' --output 'annotations.json'
                ```
                To export specific tasks with IDs of 123 and 345, run the following from the command line:
                ```bash
                curl -X GET 'http://localhost:8000/api/projects/{id}/export?ids[]=123&ids[]=345' -H 'Authorization: Token abc123' --output 'annotations.json'
                ```
                
      tags:
        - subpackage_projects.subpackage_projects/exports
      parameters:
        - name: id
          in: path
          description: A unique integer value identifying this project.
          required: true
          schema:
            type: integer
        - name: download_all_tasks
          in: query
          description: If true, download all tasks regardless of status. If false, download only annotated tasks.
          required: false
          schema:
            type: boolean
        - name: download_resources
          in: query
          description: If true, download all resource files such as images, audio, and others relevant to the tasks.
          required: false
          schema:
            type: boolean
        - name: export_type
          in: query
          description: Selected export format (JSON by default)
          required: false
          schema:
            type: string
        - name: ids
          in: query
          description: Specify a list of task IDs to retrieve only the details for those tasks.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: Authorization
          in: header
          description: >-
            The token (or API key) must be passed as a request header. You can find your user token on the User Account
            page in Label Studio. Example: <br><pre><code class="language-bash">curl
            https://label-studio-host/api/projects -H "Authorization: Token [your-token]"</code></pre>
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exported data
          content:
            application/json:
              schema:
                type: string
                format: binary
