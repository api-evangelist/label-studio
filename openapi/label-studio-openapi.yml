            https://label-studio-host/api/projects -H "Authorization: Token [your-token]"</code></pre>
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Actions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiDmActionsGetResponsesContentApplicationJsonSchemaItems'
    post:
      operationId: create
      summary: Post actions
      description: >-
        Perform a Data Manager action with the selected tasks and filters. Note: More complex actions require additional
        parameters in the request body. Call `GET api/actions?project=<id>` to explore them. <br>Example: `GET
        api/actions?id=delete_tasks&project=1`
      tags:
        - subpackage_actions
      parameters:
        - name: id
          in: query
          description: Action name ID, see the full list of actions in the `GET api/actions` request
          required: true
          schema:
            $ref: '#/components/schemas/ApiDmActionsPostParametersId'
        - name: project
          in: query
          description: Project ID
          required: true
          schema:
            type: integer
        - name: view
          in: query
          description: >-
            View ID (optional, it has higher priority than filters, selectedItems and ordering from the request body
            payload)
          required: false
          schema:
            type: integer
        - name: Authorization
          in: header
          description: >-
            The token (or API key) must be passed as a request header. You can find your user token on the User Account
            page in Label Studio. Example: <br><pre><code class="language-bash">curl
            https://label-studio-host/api/projects -H "Authorization: Token [your-token]"</code></pre>
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Action performed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/actions_create_Response_200'
      requestBody:
        description: Data payload containing task filters, selected task items, and ordering
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: '#/components/schemas/ApiDmActionsPostRequestBodyContentApplicationJsonSchemaFilters'
                  description: >-
                    Filters to apply on tasks. You can use [the helper class `Filters` from this
                    page](https://labelstud.io/sdk/data_manager.html) to create Data Manager Filters.<br>Example:
                    `{"conjunction": "or", "items": [{"filter": "filter:tasks:completed_at", "operator": "greater",
                    "type": "Datetime", "value": "2021-01-01T00:00:00.000Z"}]}`
                ordering:
                  type: array
                  items:
                    $ref: '#/components/schemas/ApiDmActionsPostRequestBodyContentApplicationJsonSchemaOrderingItems'
                  description: >-
                    List of fields to order by. Fields are similar to filters but without the `filter:` prefix. To
                    reverse the order, add a minus sign before the field name, e.g. `-tasks:created_at`.
                selectedItems:
                  $ref: '#/components/schemas/ApiDmActionsPostRequestBodyContentApplicationJsonSchemaSelectedItems'
                  description: >-
                    Task selection by IDs. If filters are applied, the selection will be applied to the filtered
                    tasks.If "all" is `false`, `"included"` must be used. If "all" is `true`, `"excluded"` must be
                    used.<br>Examples: `{"all": false, "included": [1, 2, 3]}` or `{"all": true, "excluded": [4, 5]}`
