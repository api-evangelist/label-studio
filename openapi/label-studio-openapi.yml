          description: Predictions for this task
        predictions_model_versions:
          type: string
        predictions_results:
          type: string
        predictions_score:
          type: number
          format: double
        project:
          type:
            - integer
            - 'null'
          description: Project ID for this task
        review_time:
          type: integer
          description: |-
            Calculate total review time for this task from MetricInTimeBucket records.
            Returns time in seconds.
        reviewed:
          type: boolean
        reviewers:
          type: array
          items:
            type: object
            additionalProperties:
              description: Any type
        reviewers_count:
          type: integer
        reviews_accepted:
          type: integer
        reviews_rejected:
          type: integer
        state:
          type: string
        storage_filename:
          type: string
        total_annotations:
          type: integer
        total_predictions:
          type: integer
        unresolved_comment_count:
          type: integer
          description: Number of unresolved comments in the task including all annotations
        updated_at:
          type: string
          format: date-time
          description: Last time a task was updated
        updated_by:
          type: array
          items:
            $ref: '#/components/schemas/LseTaskUpdatedByItems'
          description: User IDs who updated this task
