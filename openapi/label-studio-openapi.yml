        **User Rotation Best Practices for API Usage**


        To maintain compliance with our licensing terms and ensure optimal performance of HumanSignal's APIs, please
        consider the following guidelines when managing user assignments:


        * **Maintain a 7-Day Minimum Assignment**: Once a licensed seat is assigned to a user, maintain that assignment
        for at least seven consecutive days before rotating it to another user.


        * **Automate, Monitor, and Log Rotations**: Implement automated scheduling and logging mechanisms to track the
        timing of user rotations. This helps ensure that rotations adhere to the seven-day minimum period.


        * **Adhere to API Update Frequency and Wait Periods**: When updating user assignments via our APIs, follow the
        recommended frequency and wait period guidelines provided in the HumanSignal API documentation. Avoid sending
        rapid, successive requests that might overload the endpoint. Instead, incorporate appropriate delays between
        calls as specified in the documentation.


        * **Avoid Overloading the API Endpoint**: Design your integration to batch or schedule updates where possible,
        and implement backoff strategies if the API indicates rate limiting. This helps prevent service disruptions and
        ensures a smooth operation.

