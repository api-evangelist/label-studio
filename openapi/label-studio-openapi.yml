        drafts:
          type: array
          items:
            $ref: '#/components/schemas/LseTaskDraftsItems'
          description: Drafts for this task
        file_upload:
          type: string
        ground_truth:
          type: boolean
        id:
          type: integer
        inner_id:
          type: integer
        is_labeled:
          type: boolean
          description: >-
            True if the number of annotations for this task is greater than or equal to the number of
            maximum_completions for the project
        last_comment_updated_at:
          type:
            - string
            - 'null'
          format: date-time
          description: When the last comment was updated
        meta:
          oneOf:
            - description: Any type
            - type: 'null'
          description: >-
            Meta is user imported (uploaded) data and can be useful as input for an ML Backend for embeddings, advanced
            vectors, and other info. It is passed to ML during training/predicting steps.
        overlap:
          type: integer
          description: Number of distinct annotators that processed the current task
        precomputed_agreement:
          type:
            - number
            - 'null'
          format: double
