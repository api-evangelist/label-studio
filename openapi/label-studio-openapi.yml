  /api/projects/{id}/members/paginated/:
    get:
      operationId: list
      summary: ✨ Get project members paginated
      description: >-
        <Card href="https://humansignal.com/goenterprise">
                <img style="pointer-events: none; margin-left: 0px; margin-right: 0px;" src="https://docs.humansignal.com/images/badge.svg" alt="Label Studio Enterprise badge"/>
                <p style="margin-top: 10px; font-size: 14px;">
                    This endpoint is not available in Label Studio Community Edition. [Learn more about Label Studio Enterprise](https://humansignal.com/goenterprise)
                </p>
            </Card>
        Retrieve the members for a specific project.


        **Response Fields:**

        - `implicit_member` (boolean): Indicates if the user is an implicit member.
          - `true`: User has access via workspace membership or organization role (Administrator/Owner)
          - `false`: User is an explicit project member (added directly to the project)
        - `project_role` (string|null): Project-specific role override if assigned, null otherwise


        **Note:** Users can have both explicit membership AND implicit access. The `implicit_member` field is `false` if
        the user has an explicit ProjectMember entry, regardless of whether they also have implicit access via workspace
        or org role.
      tags:
        - subpackage_projects.subpackage_projects/members.subpackage_projects/members/paginated
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ids
          in: query
          description: Comma-separated list of user IDs to filter by
          required: false
          schema:
            type: string
        - name: implicit
          in: query
          description: >-
            Include/Exclude implicit project members in the results. If not provided, explicit + implicit members are
            returned.
          required: false
          schema:
            type: boolean
        - name: last_activity__gte
          in: query
          description: >-
            Filter by last activity time (ISO 8601 datetime). Returns users with last activity greater than or equal to
            this time.
          required: false
          schema:
            type: string
            format: date-time
        - name: last_activity__lte
          in: query
          description: >-
            Filter by last activity time (ISO 8601 datetime). Returns users with last activity less than or equal to
            this time.
          required: false
          schema:
            type: string
            format: date-time
        - name: no_annotators
          in: query
          description: Exclude annotators from the results
          required: false
          schema:
            type: boolean
        - name: ordering
          in: query
          description: >-
            Ordering field. Prefix with "-" for descending order. Allowed fields: id, email, first_name, last_name,
            username, last_activity, role, date_joined


            **Note on role ordering:**

            When ordering by "role", the system uses the effective role:

            - Project-specific role if assigned (takes precedence)

            - Organization role if no project role is assigned


            Roles are sorted alphabetically by their code: AD (Administrator), AN (Annotator), DI (Disabled), MA
            (Manager), NO (Not Activated), OW (Owner), RE (Reviewer)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: role
          in: query
          description: >-
            Filter members by role. Accepts single role or comma-separated list of roles.


            **Format:**

            - Single role: `?role=RE`

            - Multiple roles: `?role=AN,RE` (users with ANY of these roles)


            **Role Codes:**

            - `OW` = Owner

            - `AD` = Administrator

            - `MA` = Manager

            - `RE` = Reviewer

            - `AN` = Annotator


            **Matching Logic:**

            Returns users who have any of the specified roles either:

            1. As their **project-specific role** (from project role assignments), OR

            2. As their **organization role** (if they have no project-specific role override)


            **Note:** Project-specific roles take precedence. If a user has a project role assigned, their organization
            role is ignored for filtering purposes.
          required: false
          schema:
            type: string
        - name: search
          in: query
          description: Search term for filtering members by name, email, or username
          required: false
          schema:
            type: string
        - name: tags
          in: query
          description: Filter members by tags. Use a comma-separated list of tag IDs.
          required: false
          schema:
            type: string
        - name: with_deleted
          in: query
          description: Include deleted members in the results
          required: false
          schema:
            type: boolean
        - name: Authorization
          in: header
          description: >-
            The token (or API key) must be passed as a request header. You can find your user token on the User Account
            page in Label Studio. Example: <br><pre><code class="language-bash">curl
            https://label-studio-host/api/projects -H "Authorization: Token [your-token]"</code></pre>
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaginatedProjectMemberList'
